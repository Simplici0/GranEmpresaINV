cd /Users/alvarocarrasquilla/GranEmpresaINV
cat > .github/workflows/deploy.yml << 'EOF'
name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Build binary
      run: |
        GOOS=linux GOARCH=amd64 go build -o stocki
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 2222 37.27.222.238 >> ~/.ssh/known_hosts
    
    - name: Deploy to server
      run: |
        scp -P 2222 stocki AlvaroC@37.27.222.238:/tmp/stocki
        ssh -p 2222 AlvaroC@37.27.222.238 "sudo systemctl stop stocki && sudo mv /tmp/stocki /opt/stocki/stocki && sudo chmod +x /opt/stocki/stocki && 
sudo systemctl start stocki"
EOF
